name: BOS+FVG Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run bot
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACCOUNT_SIZE:     ${{ secrets.ACCOUNT_SIZE }}
          RISK_PCT:         ${{ secrets.RISK_PCT }}
        run: python fvg_bot_single.py

      - name: Save state
        run: |
          git config user.name "BOS+FVG Bot"
          git config user.email "bot@bosfvg.com"
          git stash
          git pull --rebase origin main
          git stash pop || true
          git add state.json
          git diff --staged --quiet || git commit -m "Update state [skip ci]"
          git push
          
